name: detect-and-retrain

on:
  schedule:
    - cron: '0 */6 * * *'   # every 6 hours
  workflow_dispatch:          # manual trigger

jobs:
  detect-and-retrain:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4          # ✅ updated

      - name: Set up Python
        uses: actions/setup-python@v5      # ✅ updated
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run drift detection
        run: python pipeline/drift_detection.py

      - name: Retrain model if drift detected
        run: python pipeline/retrain.py

      - name: Evaluate new model
        run: python pipeline/evaluate.py

      - name: Upload model artifacts
        uses: actions/upload-artifact@v4   # ✅ updated from v3
        with:
          name: model-artifacts
          path: models/
          retention-days: 30
