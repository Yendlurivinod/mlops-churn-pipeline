name: detect-and-retrain

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # ✅ fixes Node.js warning

jobs:
  detect-and-retrain:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run drift detection
        id: drift
        run: |
          python pipeline/drift_detection.py
        continue-on-error: true            # ✅ prevents exit code 2 crash

      - name: Retrain if drift detected
        if: steps.drift.outcome == 'success'
        run: python pipeline/retrain.py

      - name: Evaluate new model
        run: python pipeline/evaluate.py

      - name: Upload model artifacts
        uses: actions/upload-artifact@v4   # ✅ v4
        with:
          name: model-artifacts
          path: models/
          retention-days: 30
